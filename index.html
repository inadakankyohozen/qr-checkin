<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a5276">
<title>受付</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1a5276;--blue-dark:#154360;
  --green:#27ae60;--red:#e74c3c;--orange:#e67e22;
  --bg:#f0f4f8;
}
body{
  font-family:-apple-system,"Hiragino Sans",sans-serif;
  background:var(--blue);min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
}

/* ===== 初回設定 ===== */
#setup-screen{
  display:none;flex:1;align-items:center;justify-content:center;
  padding:24px 16px;flex-direction:column;gap:14px;background:#f0f4f8;
}
#setup-screen.active{display:flex;}
.setup-card{
  background:#fff;border-radius:20px;padding:24px 20px;
  width:100%;max-width:480px;box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
.setup-card h2{font-size:18px;color:var(--blue);margin-bottom:6px;font-weight:700;}
.setup-card p{font-size:13px;color:#666;line-height:1.7;margin-bottom:16px;}
.setup-card label{font-size:13px;color:#444;display:block;margin-bottom:5px;font-weight:500;}
.setup-card input{
  width:100%;font-size:14px;padding:11px 13px;
  border:1.5px solid #ddd;border-radius:10px;margin-bottom:14px;background:#f8f9fa;
}
.setup-card input:focus{outline:none;border-color:var(--blue);}
.setup-save-btn{
  width:100%;padding:13px;background:var(--blue);color:#fff;
  border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;
}
.setup-hint{
  font-size:12px;color:#888;background:#fff;border-radius:10px;
  padding:10px 14px;line-height:1.7;width:100%;max-width:480px;
}

/* ===== トップバー ===== */
#top-bar{
  background:var(--blue-dark);padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
#org-name{font-size:13px;font-weight:600;color:#fff;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#top-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#event-badge{
  font-size:11px;background:rgba(255,255,255,0.2);border-radius:20px;
  padding:3px 9px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff;
}
#settings-btn{
  background:rgba(255,255,255,0.15);border:none;color:#fff;
  width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;flex-shrink:0;
}

/* ===== メイン ===== */
#main-screen{display:none;flex-direction:column;height:100vh;height:100dvh;}
#main-screen.active{display:flex;}
#content-wrap{flex:1;display:flex;overflow:hidden;}

/* ===== iPad横向き：左右分割 ===== */
#left-panel{
  flex:0 0 46%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:10px;gap:8px;background:var(--blue);
}
#right-panel{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);overflow-y:auto;
}

/* 行事選択 */
#event-selector-wrap{width:100%;}
#event-selector-wrap label{font-size:11px;color:rgba(255,255,255,0.7);display:block;margin-bottom:3px;}
#event-select{
  width:100%;font-size:13px;padding:7px 10px;
  border:1.5px solid rgba(255,255,255,0.3);border-radius:10px;
  background:rgba(255,255,255,0.1);color:#fff;-webkit-appearance:none;cursor:pointer;
}
#event-select option{color:#333;background:#fff;}

/* カメラ */
#camera-card{
  background:#000;border-radius:14px;overflow:hidden;
  width:100%;aspect-ratio:1/1;position:relative;
  border:3px solid rgba(255,255,255,0.25);
}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.corner{position:absolute;width:40px;height:40px;border-color:#fff;border-style:solid;opacity:0.9;}
.corner.tl{top:16%;left:16%;border-width:3px 0 0 3px;}
.corner.tr{top:16%;right:16%;border-width:3px 3px 0 0;}
.corner.bl{bottom:16%;left:16%;border-width:0 0 3px 3px;}
.corner.br{bottom:16%;right:16%;border-width:0 3px 3px 0;}
#scan-line{
  position:absolute;left:16%;right:16%;height:2px;
  background:linear-gradient(90deg,transparent,#4cf,transparent);
  animation:scan 2s ease-in-out infinite;
}
@keyframes scan{0%,100%{top:16%}50%{top:82%}}
#camera-hint{
  position:absolute;bottom:8px;left:0;right:0;
  text-align:center;color:rgba(255,255,255,0.85);font-size:11px;font-weight:500;
}
#start-btn{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--blue);color:#fff;border:none;
  padding:9px 18px;border-radius:22px;font-size:13px;font-weight:600;
  cursor:pointer;z-index:10;white-space:nowrap;
}
#canvas{display:none;}
#camera-controls{width:100%;display:flex;justify-content:center;}
#camera-flip-btn{
  background:rgba(255,255,255,0.15);color:#fff;
  border:1.5px solid rgba(255,255,255,0.3);
  padding:5px 14px;border-radius:18px;font-size:12px;cursor:pointer;
  display:none;align-items:center;gap:4px;
}
#camera-mode-label{font-size:11px;color:rgba(255,255,255,0.55);text-align:center;}

/* 右パネル共通 */
#datetime-block{
  background:#fff;padding:14px 18px 10px;
  border-bottom:1px solid #e8ecf0;flex-shrink:0;
}
#date-display{font-size:13px;color:#666;font-weight:500;}
#time-display{font-size:44px;font-weight:700;color:var(--blue);line-height:1;letter-spacing:-2px;}
#time-seconds{font-size:24px;color:#aaa;font-weight:400;}

#result-card{
  margin:10px 12px 0;border-radius:14px;padding:14px;display:none;flex-shrink:0;
}
#result-card.success{background:#eafaf1;border:2px solid var(--green);}
#result-card.error  {background:#fef9e7;border:2px solid var(--orange);}
#result-card.dup    {background:#fef5f5;border:2px solid var(--red);}
.result-icon   {font-size:28px;text-align:center;margin-bottom:4px;}
.result-name   {font-size:17px;font-weight:700;text-align:center;color:#1a1a1a;}
.result-company{font-size:12px;text-align:center;color:#555;margin-top:2px;}
.result-msg    {font-size:12px;text-align:center;margin-top:5px;color:#333;}

#counter-card{
  margin:8px 12px 6px;background:#fff;border-radius:12px;padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.count-box{text-align:center;flex:1;}
.count-label{font-size:10px;color:#888;}
.count-num{font-size:22px;font-weight:700;color:var(--blue);}
.count-divider{width:1px;height:30px;background:#e0e0e0;}

#recent-card{margin:0 12px 12px;background:#fff;border-radius:12px;padding:10px 12px;flex-shrink:0;}
#recent-card h3{font-size:11px;color:#888;margin-bottom:6px;}
#recent-list{list-style:none;}
#recent-list li{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:12px;
}
#recent-list li:last-child{border-bottom:none;}
.recent-name{font-weight:600;}
.recent-company{color:#777;font-size:10px;}
.recent-time{color:#aaa;font-size:10px;white-space:nowrap;}
#no-camera{color:#fff;padding:16px 10px;text-align:center;font-size:12px;line-height:1.8;}
#no-camera button{
  margin-top:10px;background:var(--blue);color:#fff;
  border:none;padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;
}

/* ===== スマートフォン縦向き ===== */
@media (max-width:768px),(orientation:portrait) and (max-width:1024px){
  body{overflow-y:auto;}
  #main-screen{height:auto;min-height:100vh;min-height:100dvh;}
  #content-wrap{flex-direction:column;overflow:visible;}

  #left-panel{
    flex:none;width:100%;padding:12px 12px 8px;
    justify-content:flex-start;gap:8px;
  }
  #camera-card{
    width:100%;max-width:360px;margin:0 auto;
  }
  #right-panel{flex:none;overflow-y:visible;}

  #datetime-block{padding:10px 14px 8px;}
  #time-display{font-size:34px;}
  #time-seconds{font-size:20px;}
  #date-display{font-size:12px;}

  #counter-card{margin:8px 10px 6px;padding:8px 10px;}
  .count-num{font-size:20px;}
  #result-card{margin:8px 10px 0;}
  #recent-card{margin:0 10px 10px;}
}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <h2>初回設定</h2>
    <p>GASのWebアプリURLを入力してください。<br>一度設定すると次回から自動で開きます。</p>
    <label>GAS WebアプリURL</label>
    <input type="url" id="gas-url-input" placeholder="https://script.google.com/macros/s/.../exec">
    <button class="setup-save-btn" onclick="saveGasUrl()">保存して受付を開始</button>
  </div>
  <div class="setup-hint">GASエディタ → デプロイ → デプロイを管理 → URLをコピーして貼り付けてください</div>
</div>

<div id="main-screen">
  <div id="top-bar">
    <span id="org-name">千葉県環境保全センター 青年部会</span>
    <div id="top-right">
      <span id="event-badge">行事未選択</span>
      <button id="settings-btn" onclick="showSetup()">⚙</button>
    </div>
  </div>

  <div id="content-wrap">
    <div id="left-panel">
      <div id="event-selector-wrap">
        <label>行事を選択</label>
        <select id="event-select" onchange="onEventChange()">
          <option value="">-- 読み込み中... --</option>
        </select>
      </div>
      <div id="camera-card">
        <video id="video" autoplay muted playsinline webkit-playsinline></video>
        <div id="scan-frame">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div id="scan-line"></div>
        </div>
        <div id="camera-hint">下のボタンをタップしてカメラを起動</div>
        <canvas id="canvas"></canvas>
        <button id="start-btn" onclick="startCamera()">タップしてカメラを起動</button>
      </div>
      <div id="camera-controls">
        <button id="camera-flip-btn" onclick="flipCamera()">🔄 カメラ切替</button>
      </div>
      <div id="camera-mode-label"></div>
    </div>

    <div id="right-panel">
      <div id="datetime-block">
        <div id="date-display"></div>
        <div id="time-display">
          <span id="time-hm">00:00</span><span id="time-seconds">:00</span>
        </div>
      </div>
      <div id="result-card">
        <div class="result-icon" id="result-icon"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-company" id="result-company"></div>
        <div class="result-msg" id="result-msg"></div>
      </div>
      <div id="counter-card">
        <div class="count-box">
          <div class="count-label">出席済み</div>
          <div class="count-num" id="cnt-attended">-</div>
        </div>
        <div class="count-divider"></div>
        <div class="count-box">
          <div class="count-label">参加予定</div>
          <div class="count-num" id="cnt-total">-</div>
        </div>
        <div class="count-divider"></div>
        <div class="count-box">
          <div class="count-label">未受付</div>
          <div class="count-num" id="cnt-remain" style="color:var(--red);">-</div>
        </div>
      </div>
      <div id="recent-card">
        <h3>直近の受付</h3>
        <ul id="recent-list">
          <li style="color:#ccc;font-size:11px;justify-content:center;">まだ受付はありません</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
var GAS_URL="",currentEventId="",isProcessing=false,scanning=false,cbCount=0;
var currentFacing="environment";

function jsonp(url,cb){
  var n="__cb"+(cbCount++);
  window[n]=function(d){delete window[n];if(s.parentNode)s.parentNode.removeChild(s);cb(null,d);};
  var s=document.createElement("script");
  s.src=url+(url.indexOf("?")>=0?"&":"?")+"callback="+n;
  s.onerror=function(){delete window[n];if(s.parentNode)s.parentNode.removeChild(s);cb(new Error("e"),null);};
  document.head.appendChild(s);
}

window.addEventListener("load",function(){
  var saved=localStorage.getItem("gas_url");
  if(saved&&saved.indexOf("https://script.google.com")===0){GAS_URL=saved;showMain();}
  else showSetup();
  startClock();
});

function showSetup(){
  document.getElementById("setup-screen").classList.add("active");
  document.getElementById("main-screen").classList.remove("active");
  var s=localStorage.getItem("gas_url");
  if(s)document.getElementById("gas-url-input").value=s;
}
function showMain(){
  document.getElementById("setup-screen").classList.remove("active");
  document.getElementById("main-screen").classList.add("active");
  loadEvents();
}
function saveGasUrl(){
  var url=document.getElementById("gas-url-input").value.trim();
  if(!url||url.indexOf("https://script.google.com")!==0){alert("正しいGAS URLを入力してください。");return;}
  GAS_URL=url;localStorage.setItem("gas_url",url);showMain();
}

function startClock(){
  function tick(){
    var now=new Date(),days=["日","月","火","水","木","金","土"];
    var y=now.getFullYear(),mo=now.getMonth()+1,d=now.getDate(),day=days[now.getDay()];
    var h=String(now.getHours()).padStart(2,"0"),mi=String(now.getMinutes()).padStart(2,"0"),s=String(now.getSeconds()).padStart(2,"0");
    document.getElementById("date-display").textContent=y+"年"+mo+"月"+d+"日（"+day+"）";
    document.getElementById("time-hm").textContent=h+":"+mi;
    document.getElementById("time-seconds").textContent=":"+s;
  }
  tick();setInterval(tick,1000);
}

function loadEvents(){
  jsonp(GAS_URL+"?action=getEvents",function(err,events){
    var sel=document.getElementById("event-select");
    if(err||!events){sel.innerHTML='<option>読み込みエラー</option>';return;}
    sel.innerHTML='<option value="">-- 選択してください --</option>';
    events.forEach(function(ev){
      var opt=document.createElement("option");
      opt.value=ev.id;opt.textContent=ev.name+"（"+ev.date+"）";sel.appendChild(opt);
    });
  });
}

function startCamera(){
  document.getElementById("start-btn").style.display="none";
  document.getElementById("camera-hint").textContent="起動中...";
  launchCamera(currentFacing);
}

function launchCamera(facing){
  var video=document.getElementById("video");
  if(video.srcObject){video.srcObject.getTracks().forEach(function(t){t.stop();});video.srcObject=null;}
  scanning=false;
  var isPhone=window.innerWidth<=768||(window.innerHeight>window.innerWidth&&window.innerWidth<=1024);
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:facing},width:{ideal:isPhone?640:1280},height:{ideal:isPhone?640:720}},
    audio:false
  })
  .then(function(stream){
    video.srcObject=stream;
    video.play().then(function(){
      scanning=true;currentFacing=facing;
      document.getElementById("camera-hint").textContent="QRコードを枠内に合わせてください";
      document.getElementById("camera-flip-btn").style.display="flex";
      document.getElementById("camera-mode-label").textContent=facing==="environment"?"アウトカメラ使用中":"インカメラ使用中";
      requestAnimationFrame(scanFrame);
    });
  })
  .catch(function(err){
    var msg=err.name==="NotAllowedError"
      ?"カメラが許可されていません。\n設定→プライバシー→カメラから許可してください。"
      :"カメラエラー: "+err.name;
    document.getElementById("camera-card").innerHTML=
      '<div id="no-camera">'+msg.replace(/\n/g,"<br>")+'<br><button onclick="location.reload()">再試行</button></div>';
  });
}

function flipCamera(){
  var f=(currentFacing==="environment")?"user":"environment";
  document.getElementById("camera-mode-label").textContent="切替中...";
  launchCamera(f);
}

function scanFrame(){
  if(!scanning)return;
  var v=document.getElementById("video"),c=document.getElementById("canvas");
  if(v&&v.readyState===v.HAVE_ENOUGH_DATA){
    c.width=v.videoWidth;c.height=v.videoHeight;
    var ctx=c.getContext("2d");ctx.drawImage(v,0,0,c.width,c.height);
    var img=ctx.getImageData(0,0,c.width,c.height);
    var code=jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
    if(code&&!isProcessing&&currentEventId)handleQRCode(code.data);
  }
  requestAnimationFrame(scanFrame);
}

function handleQRCode(data){
  if(isProcessing)return;
  isProcessing=true;
  showResult("loading","処理中...","","");
  var url=GAS_URL+"?action=checkin&encoded="+encodeURIComponent(data.replace(/=+$/,""))+"&eventId="+encodeURIComponent(currentEventId);
  jsonp(url,function(err,result){
    if(err||!result){showResult("error","通信エラー","","再度お試しください");setTimeout(function(){hideResult();isProcessing=false;},3000);return;}
    if(result.ok)showResult("success",result.name,result.company,"受付完了  "+result.time);
    else if(result.duplicate)showResult("dup",result.name,result.company,result.msg);
    else showResult("error",result.name||"エラー",result.company||"",result.msg);
    updateSummary();
    setTimeout(function(){hideResult();isProcessing=false;},3500);
  });
}

function showResult(type,name,company,msg){
  var card=document.getElementById("result-card");
  card.style.display="block";card.className="";
  var icons={success:"✅",error:"⚠️",dup:"🔁",loading:"⏳"};
  document.getElementById("result-icon").textContent=icons[type]||"❓";
  document.getElementById("result-name").textContent=name;
  document.getElementById("result-company").textContent=company;
  document.getElementById("result-msg").textContent=msg;
  card.classList.add(type==="success"?"success":type==="dup"?"dup":"error");
}
function hideResult(){document.getElementById("result-card").style.display="none";}

function onEventChange(){
  var sel=document.getElementById("event-select");
  currentEventId=sel.value;
  var txt=currentEventId?sel.options[sel.selectedIndex].textContent:"行事未選択";
  document.getElementById("event-badge").textContent=txt.length>14?txt.substring(0,13)+"…":txt;
  if(currentEventId)updateSummary();
}

function updateSummary(){
  if(!currentEventId)return;
  jsonp(GAS_URL+"?action=summary&eventId="+encodeURIComponent(currentEventId),function(err,s){
    if(err||!s)return;
    document.getElementById("cnt-attended").textContent=s.attended;
    document.getElementById("cnt-total").textContent=s.total||"-";
    document.getElementById("cnt-remain").textContent=s.total>0?(s.total-s.attended):"-";
    var ul=document.getElementById("recent-list");
    if(s.recent&&s.recent.length>0){
      ul.innerHTML=s.recent.map(function(r){
        return'<li><div><div class="recent-name">'+r.name+'</div><div class="recent-company">'+r.company+'</div></div><div class="recent-time">'+r.time+'</div></li>';
      }).join("");
    }
  });
}
setInterval(function(){if(currentEventId)updateSummary();},30000);
</script>
</body>
</html>
